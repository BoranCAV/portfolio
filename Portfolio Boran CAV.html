<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boran CAV · Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: "#050505",
          navy: "#0a0a0a",
          panel: "#0d0d0d",
          edge: "rgba(255,255,255,0.1)",
          accent: { DEFAULT: "#ededed", soft: "#ffffff", deep: "#9a9a9a" },
        },
        fontFamily: {
          display: ["'Hanken Grotesk'", "ui-sans-serif", "system-ui", "sans-serif"],
          sans: ["'Hanken Grotesk'", "ui-sans-serif", "system-ui", "sans-serif"],
        },
      },
    },
  };
</script>

<style>
  :root {
    --bg: #050505;
    --panel: rgba(255,255,255,0.025);
    --panel-h: rgba(255,255,255,0.05);
    --line: rgba(255,255,255,0.09);
    --line-2: rgba(255,255,255,0.16);
    --white: #ffffff;
    --txt: #e6e6e6;
    --muted: #8f8f8f;
    --muted-2: #6b6b6b;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--txt);
    font-family: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  #root { display: flex; flex-direction: column; min-height: 100vh; }
  main.view { flex: 1 0 auto; }
  ::selection { background: rgba(255,255,255,0.85); color: #000; }

  /* ----------------------- LAYOUT ----------------------- */
  .wrap { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .section { padding: 100px 0; position: relative; }
  @media (min-width: 768px) { .section { padding: 128px 0; } }
  section[id] { scroll-margin-top: 70px; }

  /* ----------------------- BACKGROUND (floating paths) ----------------------- */
  .bg-stage {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: #050505;
  }
  .bg-paths { position: absolute; inset: 0; color: #ffffff; pointer-events: none; }
  .bg-paths-mirror { transform: rotate(180deg); }
  .bg-paths-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .bg-path {
    fill: none;
    stroke-dasharray: 0.4 0.6;   /* dash covers 40% of the normalised path */
    stroke-dashoffset: 0;
    animation-name: pathFlow;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
  }
  @keyframes pathFlow {
    from { stroke-dashoffset: 1; }
    to   { stroke-dashoffset: 0; }
  }
  .bg-vignette { position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: radial-gradient(125% 100% at 50% 0%, transparent 52%, rgba(5,5,5,0.75) 100%); }

  main, .nav, .footer, .proof-page { position: relative; z-index: 1; }

  /* ----------------------- REVEAL ----------------------- */
  .reveal { opacity: 0; transition: opacity 0.8s cubic-bezier(0.2,0.7,0.2,1), transform 0.8s cubic-bezier(0.2,0.7,0.2,1); }
  .reveal-up { transform: translateY(26px); }
  .reveal-left { transform: translateX(-30px); }
  .reveal-right { transform: translateX(30px); }
  .reveal.is-shown { opacity: 1; transform: none; }

  .letter-in { display: inline-block; opacity: 0; transform: translateY(0.5em); animation: letterIn 0.9s cubic-bezier(0.2,0.8,0.25,1) forwards; }
  @keyframes letterIn { to { opacity: 1; transform: none; } }

  /* ----------------------- VIEWS (pages) ----------------------- */
  .view { animation: viewIn 0.55s cubic-bezier(0.2,0.7,0.2,1) both; }
  @keyframes viewIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .view-page .section { padding-top: 118px; }
  @media (min-width: 768px) { .view-page .section { padding-top: 138px; } }

  /* justified body text */
  .tx { text-align: justify; text-justify: inter-word; hyphens: auto; -webkit-hyphens: auto; }

  /* ----------------------- PILLS / EYEBROWS ----------------------- */
  .eyebrow { display: inline-flex; align-items: center; gap: 9px; padding: 7px 15px; border-radius: 99px; white-space: nowrap;
    background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: #cfcfcf;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
  .eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.8); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .sec-head { margin-bottom: 46px; }
  .sec-head .eyebrow { margin-bottom: 22px; }
  .sec-title { font-size: clamp(38px, 6vw, 68px); font-weight: 400; letter-spacing: -0.03em; line-height: 1.02; color: #fff; }

  /* ----------------------- NAV ----------------------- */
  .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; transition: background 0.3s, border-color 0.3s; border-bottom: 1px solid transparent; }
  .nav-scrolled, .nav-solid { background: transparent; border-bottom-color: transparent; }
  .nav-inner { max-width: 1140px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
  .brand-mark { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 9px; background: #fff; color: #000; font-weight: 700; font-size: 13px; letter-spacing: -0.02em; }
  .brand-name { font-weight: 500; color: #fff; font-size: 16px; letter-spacing: 0.01em; white-space: nowrap; }
  .nav-links { display: none; gap: 4px; }
  @media (min-width: 860px) { .nav-links { display: flex; } }
  .nav-links a { padding: 8px 15px; border-radius: 99px; color: #9a9a9a; text-decoration: none; font-size: 14.5px; font-weight: 400; transition: color 0.2s, background 0.2s; }
  .nav-links a:hover { color: #fff; }
  .nav-links a.is-active { color: #fff; background: rgba(255,255,255,0.08); }
  .nav-burger { display: grid; place-items: center; width: 42px; height: 42px; border-radius: 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: #fff; cursor: pointer; }
  @media (min-width: 860px) { .nav-burger { display: none; } }
  .nav-mobile { display: flex; flex-direction: column; gap: 2px; max-height: 0; overflow: hidden; background: rgba(6,6,6,0.96); backdrop-filter: blur(16px); transition: max-height 0.35s ease, padding 0.35s ease; padding: 0 16px; border-bottom: 1px solid transparent; }
  .nav-mobile.is-open { max-height: 420px; padding: 8px 16px 16px; border-bottom-color: var(--line); }
  .nav-mobile a { padding: 13px 14px; border-radius: 10px; color: #c4c4c4; text-decoration: none; font-weight: 400; }
  .nav-mobile a.is-active { color: #fff; background: rgba(255,255,255,0.08); }

  /* ----------------------- HERO ----------------------- */
  .hero { min-height: 100vh; min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 90px 24px 60px; position: relative; }
  .hero-inner { max-width: 940px; }
  .hero-eyebrow { display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; border-radius: 99px; white-space: nowrap; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: #d4d4d4; font-size: 12px; font-weight: 400; letter-spacing: 0.2em; margin-bottom: 30px; }
  .hero-eyebrow-dot { width: 7px; height: 7px; border-radius: 50%; background: #fff; box-shadow: 0 0 12px #fff; animation: pulse 2.4s ease-in-out infinite; }
  .hero-name { font-weight: 400; line-height: 0.96; letter-spacing: -0.035em; color: #fff; font-size: clamp(60px, 13vw, 156px); }
  .hero-name-accent { background: linear-gradient(180deg, #ffffff 0%, #ffffff 38%, #6a6a6a 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .hero-title { display: inline-flex; align-items: center; gap: 16px; margin-top: 30px; opacity: 0; animation: fadeUp 0.9s ease forwards 1.1s; }
  .hero-title-line { width: 44px; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7)); }
  .hero-title-text { font-size: clamp(17px, 3vw, 25px); font-weight: 400; color: #b9b9b9; letter-spacing: 0.01em; }
  .hero-actions { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; margin-top: 42px; opacity: 0; animation: fadeUp 0.9s ease forwards 1.3s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
  .hero-nav-hint { display: inline-flex; align-items: center; gap: 14px; margin-top: 54px; font-size: 12.5px; letter-spacing: 0.04em; color: #6b6b6b; opacity: 0; animation: fadeUp 0.9s ease forwards 1.55s; }
  .hero-nav-hint-line { width: 30px; height: 1px; background: rgba(255,255,255,0.25); }

  /* ----------------------- BUTTONS ----------------------- */
  .btn-primary, .btn-ghost { display: inline-flex; align-items: center; gap: 9px; padding: 13px 22px; border-radius: 12px; font-weight: 500; text-decoration: none; cursor: pointer; font-size: 15px; font-family: "Hanken Grotesk"; transition: transform 0.2s, background 0.2s, border-color 0.2s, box-shadow 0.2s; }
  .btn-primary { color: #fff; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 10px 30px rgba(0,0,0,0.5); }
  .btn-primary:hover { transform: translateY(-2px); background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 14px 36px rgba(0,0,0,0.6); }
  .btn-ghost { color: #e2e2e2; background: rgba(255,255,255,0.02); border: 1px solid var(--line); }
  .btn-ghost:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.06); color: #fff; }

  /* ----------------------- ABOUT ----------------------- */
  .photo-frame { position: relative; }
  .photo-slot { position: relative; aspect-ratio: 4/5; border-radius: 16px; overflow: hidden; border: 1px solid var(--line); background: rgba(255,255,255,0.02); display: grid; place-items: center; }
  .photo-stripes { position: absolute; inset: 0; background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 12px, transparent 12px 24px); }
  .photo-label { position: relative; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; letter-spacing: 0.1em; color: #6b6b6b; padding: 6px 12px; border: 1px dashed rgba(255,255,255,0.18); border-radius: 8px; background: rgba(0,0,0,0.4); }
  .mono-slot { background: radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,0.06), rgba(255,255,255,0.02) 60%); }
  .mono-card { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; padding: 0 20px; }
  .mono-mark { font-size: 64px; font-weight: 700; line-height: 1; letter-spacing: 0.04em; color: #fff;
    width: 110px; height: 110px; display: grid; place-items: center; border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.04); }
  .mono-name { font-size: 20px; font-weight: 600; color: #fff; margin-top: 8px; }
  .mono-role { font-size: 12.5px; letter-spacing: 0.06em; color: #8a8a8a; }
  .photo-corner { position: absolute; width: 24px; height: 24px; border: 1.5px solid rgba(255,255,255,0.6); }
  .photo-corner-tl { top: -6px; left: -6px; border-right: none; border-bottom: none; border-top-left-radius: 5px; }
  .photo-corner-br { bottom: -6px; right: -6px; border-left: none; border-top: none; border-bottom-right-radius: 5px; }
  .stat-card { padding: 18px 16px; border-radius: 14px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); }

  /* ----------------------- SKILLS ----------------------- */
  .section-skills { padding-top: 110px; padding-bottom: 110px; }
  @media (min-width: 768px) { .section-skills { padding-top: 140px; padding-bottom: 140px; } }
  .skills-intro { max-width: 720px; font-size: 17px; line-height: 1.75; color: #9a9a9a; margin: -6px 0 44px; }
  .skill-group { margin-bottom: 46px; }
  .skill-group:last-child { margin-bottom: 0; }
  .skill-group-title { display: flex; align-items: center; gap: 12px; font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #6f6f6f; margin-bottom: 22px; }
  .skill-group-bar { width: 26px; height: 1px; background: rgba(255,255,255,0.55); }
  .skill-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 640px) { .skill-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .skill-grid { grid-template-columns: repeat(3, 1fr); } }

  .skill-card { display: flex; flex-direction: column; gap: 16px; padding: 22px 22px 18px; border-radius: 16px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); text-decoration: none; transition: transform 0.28s, border-color 0.28s, background 0.28s; cursor: pointer; }
  .skill-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.05); }
  .skill-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .skill-card-name { font-size: 21px; font-weight: 500; color: #fff; line-height: 1.1; letter-spacing: -0.01em; }
  .skill-card-blurb { font-size: 13px; color: #8a8a8a; margin-top: 5px; line-height: 1.4; }
  .skill-card-pct { font-size: 22px; font-weight: 500; color: #fff; flex-shrink: 0; }
  .skill-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 2px; }
  .skill-card-ctx { display: flex; flex-wrap: wrap; gap: 6px; }
  .skill-card-tag { font-size: 11px; font-weight: 400; color: #b4b4b4; background: rgba(255,255,255,0.05); border: 1px solid var(--line); padding: 3px 9px; border-radius: 6px; white-space: nowrap; }
  .skill-card-cta { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 500; color: #6f6f6f; white-space: nowrap; transition: color 0.25s, gap 0.25s; }
  .skill-card:hover .skill-card-cta { color: #fff; gap: 8px; }

  .skill-track { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .skill-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #5a5a5a, #ffffff); transition: width 1.3s cubic-bezier(0.22,1,0.36,1); }
  .chip { padding: 8px 16px; border-radius: 99px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); color: #c0c0c0; font-size: 14px; font-weight: 400; }

  /* ----------------------- PROJECTS ----------------------- */
  .project-card { border-radius: 18px; overflow: hidden; background: rgba(255,255,255,0.025); border: 1px solid var(--line); transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; }
  .project-card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.28); box-shadow: 0 22px 50px rgba(0,0,0,0.6); }
  .project-card a { text-decoration: none; }
  .project-image { position: relative; aspect-ratio: 16/9; display: grid; place-items: center; border-bottom: 1px solid var(--line); overflow: hidden;
    background:
      radial-gradient(70% 90% at 50% 42%, rgba(255,255,255,0.07), transparent 70%),
      linear-gradient(135deg, #0c0c0c, #161616); }
  /* hachures fines, estompées vers le centre (effet projecteur) */
  .project-stripes { position: absolute; inset: 0;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 11px);
    -webkit-mask-image: radial-gradient(circle at 50% 44%, transparent 26%, rgba(0,0,0,0.55) 62%, #000 100%);
            mask-image: radial-gradient(circle at 50% 44%, transparent 26%, rgba(0,0,0,0.55) 62%, #000 100%); }
  /* liseré lumineux en haut + voile sombre en bas pour le contraste */
  .project-image::after { content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.05), transparent 22%),
      linear-gradient(0deg, rgba(0,0,0,0.35), transparent 40%); }
  .project-illu { position: relative; display: grid; place-items: center; color: rgba(255,255,255,0.42);
    transition: color 0.3s ease, transform 0.4s ease; }
  /* halo derrière l'illustration */
  .project-illu::before { content: ""; position: absolute; width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.12), rgba(255,255,255,0.04) 45%, transparent 70%);
    transition: opacity 0.3s ease; opacity: 0.85; }
  .project-illu-svg { position: relative; width: 160px; height: 160px;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.55)); }
  .project-card:hover .project-illu { color: rgba(255,255,255,0.7); transform: translateY(-3px); }
  .project-card:hover .project-illu::before { opacity: 1; }
  .project-image-label { position: relative; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; letter-spacing: 0.08em; color: #6b6b6b; padding: 6px 12px; border: 1px dashed rgba(255,255,255,0.18); border-radius: 8px; background: rgba(0,0,0,0.4); }
  .project-tag { position: absolute; top: 14px; left: 14px; font-size: 11.5px; font-weight: 500; letter-spacing: 0.04em; color: #fff; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2); padding: 5px 11px; border-radius: 99px; backdrop-filter: blur(6px); }
  .project-arrow { display: grid; place-items: center; width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--line); color: #c0c0c0; flex-shrink: 0; transition: all 0.25s; }
  .group:hover .project-arrow { background: #fff; border-color: #fff; color: #000; transform: translate(2px,-2px); }
  .tech-chip { font-size: 12.5px; font-weight: 400; color: #cfcfcf; background: rgba(255,255,255,0.05); border: 1px solid var(--line); padding: 4px 11px; border-radius: 7px; }

  /* ----------------------- TIMELINE ----------------------- */
  .timeline { position: relative; padding-left: 34px; }
  .timeline::before { content: ""; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 1px; background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.08)); }
  .timeline-item { position: relative; margin-bottom: 30px; }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-node { position: absolute; left: -34px; top: 6px; width: 15px; height: 15px; border-radius: 50%; background: #050505; border: 1.5px solid rgba(255,255,255,0.6); }
  .timeline-node.is-current { background: #fff; box-shadow: 0 0 0 5px rgba(255,255,255,0.12), 0 0 16px rgba(255,255,255,0.5); border-color: #fff; }
  .timeline-card { padding: 24px 26px; border-radius: 16px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); }
  .badge-now { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; color: #000; background: #fff; padding: 3px 10px; border-radius: 99px; text-transform: uppercase; }

  /* ----------------------- CONTACT ----------------------- */
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-size: 14px; font-weight: 400; color: #c4c4c4; }
  .field input, .field textarea { background: rgba(255,255,255,0.03); border: 1px solid var(--line); border-radius: 12px; padding: 13px 16px; color: #fff; font-family: "Hanken Grotesk"; font-size: 15px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; resize: vertical; }
  .field input::placeholder, .field textarea::placeholder { color: #5a5a5a; }
  .field input:focus, .field textarea:focus { border-color: rgba(255,255,255,0.5); box-shadow: 0 0 0 3px rgba(255,255,255,0.08); }
  .field .has-error { border-color: #c96b6b; }
  .err { font-size: 13px; color: #d98c8c; }
  .form-success { padding: 40px 30px; border-radius: 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.2); text-align: center; }
  .success-check { display: inline-grid; place-items: center; width: 58px; height: 58px; border-radius: 50%; background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
  .social-link { display: flex; align-items: center; gap: 16px; padding: 16px 18px; border-radius: 14px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); text-decoration: none; transition: border-color 0.25s, transform 0.25s, background 0.25s; }
  .social-link:hover { border-color: rgba(255,255,255,0.28); transform: translateX(4px); background: rgba(255,255,255,0.05); }
  .social-icon { display: grid; place-items: center; width: 44px; height: 44px; border-radius: 11px; background: rgba(255,255,255,0.06); color: #fff; border: 1px solid var(--line); flex-shrink: 0; }

  /* ----------------------- FOOTER ----------------------- */
  .footer { padding: 40px 0; border-top: 1px solid var(--line); background: rgba(0,0,0,0.5); }
  .footer-icon { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--line); color: #9a9a9a; transition: all 0.2s; }
  .footer-icon:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  /* ----------------------- PROOF PAGE ----------------------- */
  .proof-page { min-height: 100vh; }
  .proof-bar { position: sticky; top: 0; z-index: 40; background: rgba(6,6,6,0.72); backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); }
  .proof-bar-inner { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; padding-bottom: 14px; }
  .proof-back { display: inline-flex; align-items: center; gap: 9px; background: none; border: none; color: #c4c4c4; font-family: "Hanken Grotesk"; font-size: 15px; font-weight: 400; cursor: pointer; padding: 0; transition: color 0.2s; }
  .proof-back:hover { color: #fff; }
  .proof-back-arrow { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line); transform: rotate(180deg); transition: border-color 0.2s, background 0.2s; }
  .proof-back:hover .proof-back-arrow { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }

  .proof-hero { padding: 64px 0 40px; border-bottom: 1px solid var(--line); }
  .proof-breadcrumb { display: flex; align-items: center; gap: 10px; font-size: 13px; letter-spacing: 0.05em; color: #6f6f6f; text-transform: uppercase; }
  .proof-sep { color: #3a3a3a; }
  .proof-title { font-size: clamp(44px, 8vw, 82px); font-weight: 400; letter-spacing: -0.035em; line-height: 1; color: #fff; margin: 18px 0 0; }
  .proof-blurb { font-size: clamp(17px, 2.4vw, 21px); color: #9a9a9a; margin: 18px 0 0; max-width: 640px; }
  .proof-level { max-width: 460px; margin-top: 30px; }
  .proof-level-head { display: flex; align-items: baseline; justify-content: space-between; font-size: 14px; color: #9a9a9a; margin-bottom: 10px; }
  .proof-level-head span:last-child { font-size: 17px; color: #fff; }
  .proof-context { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }

  .proof-body { padding: 56px 24px 20px; display: grid; gap: 60px; }
  .proof-section-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 26px; }
  .proof-section-num { font-size: 16px; font-weight: 500; color: #7a7a7a; }
  .proof-section-head h2 { font-size: clamp(28px, 4vw, 40px); font-weight: 400; color: #fff; letter-spacing: -0.025em; }

  .proof-evidence-list { display: grid; gap: 18px; }
  .evidence-card { padding: 26px 28px; border-radius: 16px; background: rgba(255,255,255,0.025); border: 1px solid var(--line); }
  .evidence-head { margin-bottom: 14px; }
  .evidence-tag { display: inline-block; white-space: nowrap; font-size: 11.5px; font-weight: 500; letter-spacing: 0.05em; color: #fff; background: rgba(255,255,255,0.07); border: 1px solid var(--line-2); padding: 4px 11px; border-radius: 99px; margin-bottom: 12px; }
  .evidence-head h3 { font-size: 21px; font-weight: 500; color: #fff; line-height: 1.25; }
  .evidence-card p { color: #b4b4b4; line-height: 1.75; font-size: 15.5px; }
  .evidence-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; font-size: 14px; font-weight: 500; color: #fff; text-decoration: none; padding: 9px 15px; border: 1px solid var(--line); border-radius: 10px; transition: background 0.2s, border-color 0.2s; }
  .evidence-link:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.35); }

  .reflection-card { position: relative; padding: 34px 36px; border-radius: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--line-2); overflow: hidden; }
  .reflection-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(180deg, rgba(255,255,255,0.7), transparent); }
  .reflection-quote { position: absolute; top: 6px; right: 26px; font-size: 110px; line-height: 1; color: rgba(255,255,255,0.06); pointer-events: none; }
  .reflection-card p { position: relative; color: #cfcfcf; line-height: 1.85; font-size: 16px; }
  .reflection-card p + p { margin-top: 16px; }

  .proof-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding-top: 30px; padding-bottom: 60px; margin-top: 20px; border-top: 1px solid var(--line); }
  .proof-nav-link { display: flex; flex-direction: column; gap: 5px; padding: 20px 22px; border-radius: 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--line); text-decoration: none; transition: border-color 0.25s, transform 0.25s, background 0.25s; }
  .proof-nav-link:hover { border-color: rgba(255,255,255,0.28); transform: translateY(-3px); background: rgba(255,255,255,0.05); }
  .proof-nav-next { text-align: right; align-items: flex-end; }
  .proof-nav-dir { font-size: 12.5px; color: #6f6f6f; font-weight: 400; }
  .proof-nav-name { font-size: 19px; font-weight: 500; color: #fff; }

  /* ----------------------- REDUCED MOTION ----------------------- */
  @media (prefers-reduced-motion: reduce) {
    .letter-in, .reveal, .hero-title, .hero-actions, .hero-nav-hint, .view { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
    .smoke, .glow, .hero-eyebrow-dot, .eyebrow-dot { animation: none !important; }
    html { scroll-behavior: auto; }
  }

  </style>
</head>

  <div id="root"></div>

  <!-- data-presets are babel transform options; v= query busts the browser cache during dev -->
  <script>
    // Charge les scripts JSX avec un paramètre anti-cache pour toujours voir la dernière version.
    (function () {
      var v = Date.now();
      var files = ["lib", "skills-data", "sections", "proof", "app"];
      files.forEach(function (f) {
        var s = document.createElement("script");
        s.type = "text/babel";
        s.src = "src/" + f + ".jsx?v=" + v;
        s.async = false; // garde l'ordre de chargement
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
